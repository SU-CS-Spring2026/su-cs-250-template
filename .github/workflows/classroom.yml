name: GitHub Classroom Workflow
on: [push, pull_request] # Simplifies triggers for all branches

permissions:
  checks: write
  actions: write
  contents: write

jobs:
  build:
    name: Autograding
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Run Autograde Tests 
        id: autograder
        uses: education/autograding-python-grader@v1
        continue-on-error: true
        with:
          timeout: 10
          max-score: 5
          setup-command: ''
          
      - name: Gemini QA Feedback
        id: geminifeedback
        # Use command-grader for custom scripts; it's more stable for this setup
        uses: education/autograding-command-grader@v1
        if: always()
        with:
          test-name: 'Gemini QA Analysis'
          setup-command: 'python -m pip install -U google-genai'
          # This command is the 'Source of Truth' for the reporter
          command: 'python .github/scripts/qa_feedback.py'
          timeout: 10
          max-score: 5

      - name: Autograding Reporter
        uses: education/autograding-grading-reporter@v1
        if: always()
        with:
          # Only list the runner that we know is producing a result
          runners: geminifeedback
