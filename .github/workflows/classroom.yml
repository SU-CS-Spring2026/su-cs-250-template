name: GitHub Classroom Workflow
on: [push, pull_request] # Simplifies triggers for all branches

permissions:
  checks: write
  actions: write
  contents: write

jobs:
  build:
    name: Autograding
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Run Gemini Analysis
        id: autograder
        uses: education/autograding-python-grader@v1
        with:
          # Use 'setup-command' for your pip install
          setup-command: 'python -m pip install -U google-genai'
          # Use 'python-command', NOT 'command' or 'test-name'
          python-command: 'python .github/scripts/qa_feedback.py'
          timeout: 10
          max-score: 5
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}

      - name: Autograding Reporter
        uses: education/autograding-grading-reporter@v1
        if: always()
        with:
          runners: autograder
