name: GitHub Classroom Workflow
on: [push, pull_request]

permissions:
  checks: write
  actions: write
  contents: write

jobs:
  build:
    name: Autograding
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Gemini Analysis
        # We use the official 'command-grader' because it creates the 
        # internal file the Reporter is hard-coded to find.
        uses: education/autograding-command-grader@v1
        id: geminirun
        continue-on-error: true
        with:
          test-name: 'Gemini QA Feedback'
          setup-command: 'python -m pip install -U google-genai'
          # Use 'command', NOT 'python-command'
          command: 'python .github/scripts/qa_feedback.py'
          timeout: 10
          max-score: 5
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GITHUB_ACTOR: ${{ github.actor }}

      - name: Autograding Reporter
        uses: education/autograding-grading-reporter@v1
        if: always()
        with:
          # This MUST match the 'id' above
          runners: geminirun
