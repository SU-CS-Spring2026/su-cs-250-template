name: GitHub Classroom Workflow
on: [push, pull_request] # Simplifies triggers for all branches

permissions:
  checks: write
  actions: write
  contents: write

jobs:
  build:
    name: Autograding
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Gemini Analysis
        # This ID is the "Bucket" the Reporter will look into
        id: geminifeedback 
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GITHUB_ACTOR: ${{ github.actor }}
        run: |
          python -m pip install -U google-genai
          # Use -u for unbuffered output
          python -u .github/scripts/qa_feedback.py
          # This is the 'Physical Receipt' that kills the 'undefined' error
          echo "Points 5/5"

      - name: Autograding Reporter
        uses: education/autograding-grading-reporter@v1
        if: always()
        with:
          # We ONLY list the ID that has the 'echo' safety net
          runners: geminifeedback
