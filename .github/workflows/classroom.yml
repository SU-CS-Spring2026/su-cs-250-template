name: GitHub Classroom Workflow
on: [push, pull_request] # Simplifies triggers for all branches

permissions:
  checks: write
  actions: write
  contents: write

jobs:
  build:
    name: Autograding
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Run Autograde Tests 
        id: autograder
        uses: education/autograding-python-grader@v1
        continue-on-error: true
        with:
          timeout: 10
          max-score: 5
          setup-command: 'pip install pytest'
          
      - name: Gemini QA Feedback
        id: geminifeedback
        # This 'command-grader' acts as the wrapper to create the missing JSON file
        uses: education/autograding-command-grader@v1
        if: always()
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        with:
          test-name: 'Gemini AI Analysis'
          setup-command: 'python -m pip install -U google-genai'
          # This runs your script and captures the output for the Reporter
          command: 'python .github/scripts/qa_feedback.py.'
          timeout: 10
          max-score: 5

      - name: Autograding Reporter
        uses: education/autograding-grading-reporter@v1
        if: always()
        with:
          # Now that geminifeedback is an official 'Grader', this will NOT be undefined
          runners: geminifeedback
