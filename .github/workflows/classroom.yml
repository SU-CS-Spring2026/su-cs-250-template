name: GitHub Classroom Workflow
on: [push, pull_request] # Simplifies triggers for all branches

permissions:
  checks: write
  actions: write
  contents: write

jobs:
  build:
    name: Autograding
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Run Autograde Tests 
        id: autograder
        uses: education/autograding-python-grader@v1
        continue-on-error: true
        with:
          timeout: 10
          max-score: 5
          setup-command: 'pip install pytest'
          
      - name: Gemini QA Feedback
        if: always()
        id: geminifeedback
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          python -m pip install -U google-genai
          python .github/scripts/qa_feedback.py
          echo "Points 5/5"

      - name: Autograding Reporter
        uses: education/autograding-grading-reporter@v1
        if: always()
        with:
          runners: autograder,geminifeedback
