name: GitHub Classroom Workflow
on: [push, pull_request] # Simplifies triggers for all branches

permissions:
  checks: write
  actions: write
  contents: write

jobs:
  build:
    name: Autograding
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Run Gemini Analysis
        # We use the command-grader because it is the most stable "wrapper"
        uses: education/autograding-command-grader@v1
        id: autograder
        continue-on-error: true
        with:
          test-name: 'Gemini QA Feedback'
          setup-command: 'python -m pip install -U google-genai'
          # Use 'command', NOT 'python-command'
          command: 'python .github/scripts/qa_feedback.py'
          timeout: 10
          max-score: 5
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}

      - name: Autograding Reporter
        # This MUST be 'grading-reporter'
        uses: education/autograding-grading-reporter@v1
        if: always()
        with:
          # ONLY list the ID that we defined above
          runners: autograder
