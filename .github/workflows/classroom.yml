name: GitHub Classroom Workflow
on: [push, pull_request] # Simplifies triggers for all branches

permissions:
  checks: write
  actions: write
  contents: write

jobs:
  build:
    name: Autograding
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Autograding and Gemini
        id: autograder
        uses: education/autograding-python-grader@v1
        with:
          timeout: 10
          max-score: 10
          setup-command: 'python -m pip install -U google-genai'
          # We run your script as the actual "test"
          python-command: 'python .github/scripts/qa_feedback.py.'

      - name: Autograding Reporter
        uses: education/autograding-grading-reporter@v1
        if: always()
        with:
          # By only having ONE runner that is an official 'grader' action,
          # the "undefined" error becomes mathematically impossible.
          runners: autograder
