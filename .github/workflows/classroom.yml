name: GitHub Classroom Workflow
on: [push, pull_request]

permissions:
  checks: write
  actions: write
  contents: write

jobs:
  build:
    name: Autograding
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Gemini Analysis
        id: gqastep
        uses: education/autograding-command-grader@v1
        with:
          test-name: 'Gemini Analysis'
          setup-command: 'python -m pip install -U google-genai'
          # We inject the env vars directly into the command string here
          command: 'GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }} GITHUB_ACTOR=${{ github.actor }} python ./.github/scripts/qa_feedback.py'
          timeout: 30
          max-score: 5

      - name: Debug Environment
        run: |
          echo "Checking Actor: ${{ github.actor }}"
          # Note: GitHub automatically masks secrets with *** in logs
          echo "API Key Length: ${#GEMINI_API_KEY}" 
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}


      - name: Autograding Reporter
        uses: education/autograding-grading-reporter@v1
        if: always()
        with:
          runners: gqastep
