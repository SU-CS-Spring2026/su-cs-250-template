name: GitHub Classroom Workflow1
on: [push, pull_request, workflow_dispatch]

permissions:
  checks: write
  actions: write
  contents: write

jobs:
  build:
    name: Autograding
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Gemini Analysis
        id: gqastep
        uses: classroom-resources/autograding-command-grader@v1
        with:
          test-name: 'Gemini Analysis'
          setup-command: 'python -m pip install -U google-genai'
          # We inject the env vars directly into the command string here
          command: 'GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }} GITHUB_ACTOR=${{ github.actor }} python ./.github/scripts/qa_feedback.py'
          timeout: 30
          max-score: 5

      - name: Filter Feedback
        id: filter
        run: |
          # Use sed to grab everything between the DATA markers
          FEEDBACK=$(echo "${{ steps.gqastep.outputs.result }}" | sed -n '/### DATA_START/,/### DATA_END/p' | sed '1d;$d')
          
          # This saves it so the next step can see it
          echo "clean_msg<<EOF" >> $GITHUB_OUTPUT
          echo "$FEEDBACK" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Post Feedback to PR
        uses: mshick/add-pr-comment@v2
        with:
          message-id: gemini-feedback
          # Now we use the clean output from the filter step
          message: "${{ steps.filter.outputs.clean_msg }}"
          allow-repeats: true

      - name: Autograding Reporter
        uses: classroom-resources/autograding-grading-reporter@v1
        env:
          GQASTEP_RESULTS: "${{steps.gqastep.outputs.result}}"
        with:
          runners: gqastep
