name: GitHub Classroom Workflow1
on: [push, pull_request, workflow_dispatch]

permissions:
  checks: write
  actions: write
  contents: write

jobs:
  build:
    name: Autograding
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Run Gemini Analysis
        id: gqaexec
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GITHUB_ACTOR: ${{ github.actor }}
        run: |
          pip install -r requirements.txt
          # 1. Run script and save to file
          python ./.github/scripts/qa_feedback.py > full_log.txt
          cat full_log.txt
          
          # 2. Extract ONLY the numeric score (3, 4, 5)
          # 'tr -dc 0-9' removes the binary junk tokens ()
          SCORE=$(grep -oP '(?<=<score>).*(?=</score>)' full_log.txt | tr -dc '0-9')
          echo "score=$SCORE" >> $GITHUB_OUTPUT
          
          # 3. Extract CLEAN feedback for the PR
          echo "feedback<<EOF" >> $GITHUB_OUTPUT
          sed -n '/### DATA_START/,/### DATA_END/p' full_log.txt | sed '1d;$d' >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Gemini Analysis
        id: gqastep
        uses: classroom-resources/autograding-command-grader@v1
        with:
          test-name: 'Gemini Analysis'
          # This command always 'passes' so the workflow keeps moving
          command: "echo 'Gemini analysis complete.'"
          timeout: 10
          max-score: 5

      - name: Post Feedback to PR
        uses: mshick/add-pr-comment@v2
        with:
          message-id: gemini-feedback
          message: "${{ steps.gqaexec.outputs.feedback }}"
          allow-repeats: true

      - name: Autograding Reporter
        uses: classroom-resources/autograding-grading-reporter@v1
        env:
          # THE FIX: We ignore the 'gqastep' output and use our CLEAN 'gqa_exec' score.
          # This manually overrides the 5/5 to show the REAL score (e.g., 3/5).
          GQASTEP_RESULTS: '{"totalPoints":${{ steps.gqaexec.outputs.score }},"maxPoints":5}'
        with:
          runners: gqastep
