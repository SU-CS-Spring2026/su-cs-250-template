name: GitHub Classroom Workflow1
on: [push, pull_request, workflow_dispatch]

permissions:
  checks: write
  actions: write
  contents: write

jobs:
  build:
    name: Autograding
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Run Analysis
        id: gqaexec
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GITHUB_ACTOR: ${{ github.actor }}
        run: |
          pip install -r requirements.txt
          # Run script and save to a file
          python ./.github/scripts/qa_feedback.py > full_log.txt
          cat full_log.txt
          
          # Extract ONLY the score
          SCORE=$(grep -oP '(?<=<score>).*(?=</score>)' full_log.txt)
          echo "score=$SCORE" >> $GITHUB_OUTPUT
          
          # Extract ONLY the feedback for the PR
          echo "feedback<<EOF" >> $GITHUB_OUTPUT
          sed -n '/### DATA_START/,/### DATA_END/p' full_log.txt | sed '1d;$d' >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Gemini Analysis
        id: gqastep
        uses: classroom-resources/autograding-command-grader@v1
        with:
          test-name: 'Gemini Analysis'
          # This command ALWAYS succeeds, but reports the points we found
          command: "echo 'Points earned: ${{ steps.gqaexec.outputs.score }}'"
          timeout: 10
          max-score: 5
          # THIS IS THE KEY: We force the grader to use our extracted score
          points: ${{ steps.gqaexec.outputs.score }}

      - name: Post Feedback to PR
        uses: mshick/add-pr-comment@v2
        with:
          message-id: gemini-feedback
          message: "${{ steps.gqaexec.outputs.feedback }}"
          allow-repeats: true

      - name: Autograding Reporter
        uses: classroom-resources/autograding-grading-reporter@v1
        env:
          # Handshake with the reporter
          GQASTEP_RESULTS: '{"totalPoints":${{ steps.gqastep.outputs.score }},"maxPoints":5}'
        with:
          runners: gqastep
