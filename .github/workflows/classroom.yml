name: GitHub Classroom Autograding
on: [push]
permissions:
  checks: write
  actions: read
  contents: read
jobs:
  build:
    name: Autograding
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest google-generativeai

      - name: Run Autograde Tests
        id: autograder
        uses: education/autograding-python-grader@v1
        continue-on-error: true # <--- ADD THIS LINE
        with:
          timeout: 10
          max-score: 5
          setup-command: 'pip install -r requirements.txt'

      - name: Gemini QA Feedback
        # This is the "magic" line that fixes your issue:
        if: steps.autograder.outcome == 'failure' || steps.autograder.outcome == 'error'
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python .github/scripts/qa_feedback.py

      - name: Autograding Reporter
        uses: education/autograding-grading-reporter@v1
        env:
          ANY_STEP_FAILURE: ${{ steps.autograder.outcome }}
        with:
          runners: autograder
