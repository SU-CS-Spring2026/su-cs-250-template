name: GitHub Classroom Workflow
on: [push, pull_request]

permissions:
  checks: write
  actions: write
  contents: write

jobs:
  build:
    name: Autograding
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Gemini Analysis
        id: saylorqacheck 
        uses: education/autograding-command-grader@v1
        with:
          test-name: 'Gemini Analysis'
          setup-command: 'python -m pip install -U google-genai'
          command: 'python ./.github/scripts/qa_feedback.py'
          timeout: 21
          max-score: 5
        env:
          # VITAL: Double check this is 'vars' and not 'secrets'
          GEMINI_API_KEY: ${{ vars.GEMINI_API_KEY }}
          GITHUB_ACTOR: ${{ github.actor }}

      - name: Autograding Reporter
        uses: education/autograding-grading-reporter@v1
        if: always()
        with:
          # This MUST match the unique ID above
          runners: saylorqacheck
